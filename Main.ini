; ========================================
; ★ 스킨 정보 (메타데이터)
; ========================================
[Metadata]
Name=Desktop Icon Dashboard
Author=fms2014
Information=OLED 모니터에서 바탕화면 아이콘 대신 사용하기 위한 스킨
Version=0.0.1
License=Creative Commons Attribution - Non - Commercial - Share Alike 3.0

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

; 변수와 60개 아이콘 코드를 외부에서 불러옵니다.
@Include=#@#Variables.inc

[MeasureLuaScript]
Measure=Script
ScriptFile="#@#Scripts\Layout.lua"

[MeasureFolder]
Measure=Plugin
Plugin=FileView
Path="#@#Shortcuts"
Count=(#Cols# * #Rows#)
ShowDotDot=0
HideExtensions=1
SortType=Name
Extensions=lnk;url

; 폴더 안의 전체 파일 개수를 셉니다.
[MeasureFileCount]
Measure=Plugin
Plugin=FileView
Path=[MeasureFolder]
Type=FileCount

; ========================================
; 0.5초(500ms) 툴팁 딜레이 타이머
; ========================================
[MeasureToolTipTimer]
Measure=Plugin
Plugin=ActionTimer
; Wait 500 은 0.5초 대기를 의미합니다.
ActionList1=Wait 500 | RunLua
; 0.5초 뒤에 현재 마우스가 올라가 있는 아이콘 번호와 이름을 Lua로 넘깁니다.
RunLua=[!CommandMeasure MeasureLuaScript """ShowToolTip(#HoveredIndex#, '#HoveredMeasure#')"""]
DynamicVariables=1

; ========================================
; 화면에 그리기 (UI - 배경 및 하단 메뉴바)
; ========================================

[MeterBackground]
Meter=Image
SolidColor=0,0,0,1
W=#AreaW#
H=#AreaH#
X=0
Y=0

; ----------------------------------------
; 1. [◀ 이전] 버튼 (조건부 표시)
; ----------------------------------------
[MeterPrevPage]
Meter=String
Text="◀ 이전"
X=(#AreaW# / 2 - 180)
Y=(#AreaH# - 50)
StringAlign=Center
FontFace=#FontName#
FontColor=128,128,128,#OffAlpha#
FontSize=12
SolidColor=0,0,0,1
AntiAlias=1
Hidden=1
MouseOverAction=[!SetOption MeterPrevPage FontColor "255,255,255,#OnAlpha#"][!UpdateMeter MeterPrevPage][!Redraw]
MouseLeaveAction=[!SetOption MeterPrevPage FontColor "128,128,128,#OffAlpha#"][!UpdateMeter MeterPrevPage][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureFolder "PageUp"][!UpdateMeasure MeasureFolder][!UpdateMeasure MeasureLuaScript][!Redraw]

; ----------------------------------------
; 2. [➕ 추가] 버튼 (새로고침 왼쪽 고정)
; ----------------------------------------
[MeterAdd]
Meter=String
Text="➕ 추가"
X=(#AreaW# / 2 - 60)
Y=(#AreaH# - 50)
StringAlign=Center
FontFace=#FontName#
FontColor=128,128,128,#OffAlpha#
FontSize=12
SolidColor=0,0,0,1
AntiAlias=1
MouseOverAction=[!SetOption MeterAdd FontColor "255,255,255,#OnAlpha#"][!UpdateMeter MeterAdd][!Redraw]
MouseLeaveAction=[!SetOption MeterAdd FontColor "128,128,128,#OffAlpha#"][!UpdateMeter MeterAdd][!Redraw]
LeftMouseUpAction=["#@#Shortcuts"]
ToolTipText="클릭하여 단축키 폴더를 엽니다."

; ----------------------------------------
; 3. [🔄 새로고침] 버튼 (중앙 우측)
; ----------------------------------------
[MeterRefresh]
Meter=String
Text="🔄 새로고침"
X=(#AreaW# / 2 + 60)
Y=(#AreaH# - 50)
StringAlign=Center
FontFace=#FontName#
FontColor=128,128,128,#OffAlpha#
FontSize=12
SolidColor=0,0,0,1
AntiAlias=1
MouseOverAction=[!SetOption MeterRefresh FontColor "255,255,255,#OnAlpha#"][!UpdateMeter MeterRefresh][!Redraw]
MouseLeaveAction=[!SetOption MeterRefresh FontColor "128,128,128,#OffAlpha#"][!UpdateMeter MeterRefresh][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureFolder "Update"][!UpdateMeasure MeasureLuaScript][!Redraw]

; ----------------------------------------
; 4. [다음 ▶] 버튼 (조건부 표시)
; ----------------------------------------
[MeterNextPage]
Meter=String
Text="다음 ▶"
X=(#AreaW# / 2 + 180)
Y=(#AreaH# - 50)
StringAlign=Center
FontFace=#FontName#
FontColor=128,128,128,#OffAlpha#
FontSize=12
SolidColor=0,0,0,1
AntiAlias=1
Hidden=1
MouseOverAction=[!SetOption MeterNextPage FontColor "255,255,255,#OnAlpha#"][!UpdateMeter MeterNextPage][!Redraw]
MouseLeaveAction=[!SetOption MeterNextPage FontColor "128,128,128,#OffAlpha#"][!UpdateMeter MeterNextPage][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureFolder "PageDown"][!UpdateMeasure MeasureFolder][!UpdateMeasure MeasureLuaScript][!Redraw]

@Include2=#@#Meters.inc

; ========================================
; 커스텀 툴팁 (최상단 레이어 - Lua 제어)
; ========================================
[MeterCustomToolTipBg]
Meter=Shape
; 옵션은 비워둡니다. Lua가 완벽한 Shape 문자열을 꽂아 넣습니다.
Shape=Rectangle 0,0,10,10 | Fill Color 0,0,0,0
DynamicVariables=1
Hidden=1
Group=CustomToolTip

[MeterCustomToolTipText]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontSize=11
FontColor=255,255,255,255
AntiAlias=1
DynamicVariables=1
Hidden=1
Group=CustomToolTip